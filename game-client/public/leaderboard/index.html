<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排行榜 - 复古弹幕射击</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="leaderboard-container">
        <a href="/game/play/" class="back-btn">← 返回游戏</a>
        <h1 class="leaderboard-title">🏆 全服排行榜 🏆</h1>
        
        <div class="tab-container">
            <button class="tab-btn active" data-period="today">今日排行</button>
            <button class="tab-btn" data-period="week">本周排行</button>
            <button class="tab-btn" data-period="all">历史总榜</button>
        </div>
        
        <div id="leaderboard-content">
            <div class="loading">加载中...</div>
        </div>
        
        <div style="text-align: center;">
            <a href="/game/play/" class="btn-primary">开始游戏</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        let currentPeriod = 'today';

        async function loadLeaderboard(period) {
            const content = document.getElementById('leaderboard-content');
            content.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/game/leaderboard?period=${period}`);
                const data = await response.json();
                
                if (data.success && data.data) {
                    renderLeaderboard(data.data, period);
                } else {
                    content.innerHTML = '<p style="text-align:center;color:#ff6666;">加载失败</p>';
                }
            } catch (error) {
                console.error('Failed to load leaderboard:', error);
                content.innerHTML = '<p style="text-align:center;color:#ff6666;">网络错误，请稍后重试</p>';
            }
        }

        function renderLeaderboard(entries, period) {
            const content = document.getElementById('leaderboard-content');
            
            if (entries.length === 0) {
                content.innerHTML = '<p style="text-align:center;color:#888;padding:40px;">暂无数据，快来创造第一个记录吧！</p>';
                return;
            }
            
            let html = `
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>玩家</th>
                            <th>得分</th>
                            <th>关卡</th>
                            <th>击杀</th>
                            <th>时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            entries.forEach((entry, index) => {
                const rankClass = index < 3 ? `top-${index + 1}` : '';
                const rankIcon = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : (index + 1);
                const date = new Date(entry.timestamp);
                const timeStr = period === 'today' 
                    ? date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
                    : date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
                
                html += `
                    <tr class="${rankClass}">
                        <td class="rank">${rankIcon}</td>
                        <td class="player-name">${escapeHtml(entry.playerId)}</td>
                        <td class="score">${entry.score.toLocaleString()}</td>
                        <td class="stage">${entry.stage}</td>
                        <td class="stage">${entry.enemiesKilled}</td>
                        <td class="date">${timeStr}</td>
                        <td>
                            <button class="action-btn" onclick="viewReplay('${entry.gameId}')">
                                回放
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            content.innerHTML = html;
        }

        function viewReplay(gameId) {
            window.location.href = `/replay/?id=${gameId}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPeriod = btn.dataset.period;
                loadLeaderboard(currentPeriod);
            });
        });

        loadLeaderboard(currentPeriod);
        
        setInterval(() => {
            if (document.visibilityState === 'visible') {
                loadLeaderboard(currentPeriod);
            }
        }, 30000);
    </script>
</body>
</html>
