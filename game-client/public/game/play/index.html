<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复古弹幕射击 - 飞机大战</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="game-body">
    <div id="game-container">
        <div id="start-screen" class="screen">
            <h1 class="game-title">✈️ 复古弹幕射击 ✈️</h1>
            <p class="subtitle">1945 横版飞机大战</p>
            <div class="input-group">
                <label for="playerName">玩家名称:</label>
                <input type="text" id="playerName" maxlength="12" placeholder="输入你的名字" value="Player1">
            </div>
            <div class="controls-info">
                <p>🎮 操作说明:</p>
                <p>↑↓←→ / WASD - 移动</p>
                <p>空格键 - 射击</p>
                <p>P - 暂停</p>
            </div>
            <button id="startBtn" class="btn-primary">开始游戏</button>
            <a href="/leaderboard/" class="link-btn">查看排行榜</a>
        </div>

        <div id="game-screen" class="screen hidden">
            <div class="hud">
                <div class="hud-item">得分: <span id="score">0</span></div>
                <div class="hud-item">生命: <span id="lives">3</span></div>
                <div class="hud-item">关卡: <span id="stage">1</span></div>
                <div class="hud-item">FPS: <span id="fps">0</span></div>
            </div>
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div id="pause-overlay" class="overlay hidden">
                <h2>游戏暂停</h2>
                <p>按 P 继续</p>
            </div>
        </div>

        <div id="gameover-screen" class="screen hidden">
            <h2 class="gameover-title">游戏结束</h2>
            <div class="final-stats">
                <p>最终得分: <span id="finalScore">0</span></p>
                <p>击杀敌机: <span id="enemiesKilled">0</span></p>
                <p>存活时间: <span id="surviveTime">0</span> 秒</p>
                <p id="rank-info"></p>
            </div>
            <button id="restartBtn" class="btn-primary">再来一局</button>
            <button id="uploadBtn" class="btn-secondary">上传分数</button>
            <a href="/leaderboard/" class="link-btn">查看排行榜</a>
            <div id="upload-status" class="upload-status"></div>
        </div>
    </div>

    <script src="/serializer.js"></script>
    <script src="/game.js"></script>
</body>
</html>
